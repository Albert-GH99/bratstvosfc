<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onboarding | Bratstvo Digital</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<header class="navbar">
  <a href="index.html" class="logo">BRATSTVO DIGITAL</a>
</header>

<section class="hero" style="padding:120px 20px 60px;">
  <h1>Project Onboarding</h1>
  <p>Please provide the details below so we can structure your system properly.</p>
</section>

<section style="max-width:700px;margin:0 auto 120px;padding:0 20px;">

<form id="onboardingForm">

  <div style="margin-bottom:20px;">
    <label>Full Name</label><br>
    <input type="text" id="name" required style="width:100%;padding:12px;margin-top:8px;border-radius:8px;border:none;">
  </div>

  <div style="margin-bottom:20px;">
    <label>Business Name</label><br>
    <input type="text" id="business" required style="width:100%;padding:12px;margin-top:8px;border-radius:8px;border:none;">
  </div>

  <div style="margin-bottom:20px;">
    <label>Industry</label><br>
    <input type="text" id="industry" required style="width:100%;padding:12px;margin-top:8px;border-radius:8px;border:none;">
  </div>

  <div style="margin-bottom:20px;">
    <label>Select Package</label><br>
    <select id="package" required style="width:100%;padding:12px;margin-top:8px;border-radius:8px;border:none;">
      <option value="">Choose Package</option>
      <option value="Starter System">Starter System</option>
      <option value="Structured System">Structured System</option>
      <option value="Advanced System">Advanced System</option>
    </select>
  </div>

  <div style="margin-bottom:20px;">
    <label>Main Objective</label><br>
    <textarea id="objective" required rows="4"
      style="width:100%;padding:12px;margin-top:8px;border-radius:8px;border:none;"></textarea>
  </div>

  <div style="margin-bottom:30px;">
    <label>Estimated Launch Timeline</label><br>
    <input type="text" id="timeline" required
      style="width:100%;padding:12px;margin-top:8px;border-radius:8px;border:none;">
  </div>

  <button type="submit" class="btn-primary" style="width:100%;">
    Proceed to Consultation
  </button>

</form>

</section>

<footer class="footer">
  <div class="footer-inner">
    <div>© 2026 Bratstvo Digital</div>
    <div>Structured systems for serious growth.</div>
  </div>
</footer>

<script>

document.getElementById("onboardingForm").addEventListener("submit", function(e){
  e.preventDefault();

  const name = document.getElementById("name").value;
  const business = document.getElementById("business").value;
  const industry = document.getElementById("industry").value;
  const selectedPackage = document.getElementById("package").value;
  const objective = document.getElementById("objective").value;
  const timeline = document.getElementById("timeline").value;

  const message = `
Hello Bratstvo Digital Team,

I would like to proceed with the ${selectedPackage} package.

Full Name: ${name}
Business Name: ${business}
Industry: ${industry}
Main Objective: ${objective}
Estimated Launch Timeline: ${timeline}

Kindly advise on the next steps.

Thank you.
  `;

  const phoneNumber = "601135318911"; // CHANGE THIS
  const whatsappURL = `https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`;

  window.open(whatsappURL, "_blank");
});

</script>

</body>
</html>
